<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JARVIS Recorder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050A14; overflow: hidden; font-family: 'Menlo', 'Courier New', monospace; width: 1280px; height: 720px; }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  .corner { position: fixed; width: 50px; height: 50px; pointer-events: none; }
  .corner::before, .corner::after { content: ''; position: absolute; background: rgba(0,212,255,0.5); }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tl::before { top: 0; left: 0; width: 50px; height: 1.5px; }
  .corner-tl::after  { top: 0; left: 0; width: 1.5px; height: 50px; }
  .corner-tr { top: 20px; right: 20px; }
  .corner-tr::before { top: 0; right: 0; width: 50px; height: 1.5px; }
  .corner-tr::after  { top: 0; right: 0; width: 1.5px; height: 50px; }
  .corner-bl { bottom: 20px; left: 20px; }
  .corner-bl::before { bottom: 0; left: 0; width: 50px; height: 1.5px; }
  .corner-bl::after  { bottom: 0; left: 0; width: 1.5px; height: 50px; }
  .corner-br { bottom: 20px; right: 20px; }
  .corner-br::before { bottom: 0; right: 0; width: 50px; height: 1.5px; }
  .corner-br::after  { bottom: 0; right: 0; width: 1.5px; height: 50px; }

  .top-bar { position: fixed; top: 12px; left: 30px; right: 30px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
  .top-left .label1 { font-size: 8px; letter-spacing: 4px; color: rgba(0,212,255,0.4); }
  .top-left .label2 { font-size: 7px; letter-spacing: 3px; color: rgba(0,212,255,0.25); }
  .top-center { font-size: 26px; font-weight: 300; color: #00D4FF; text-shadow: 0 0 4px rgba(0,212,255,0.9), 0 0 16px rgba(0,212,255,0.4), 0 0 40px rgba(0,212,255,0.15); }
  .top-right .day { font-size: 32px; font-weight: bold; color: #69F1F1; text-shadow: 0 0 6px rgba(0,212,255,0.8); }
  .top-right .month { font-size: 8px; letter-spacing: 3px; color: rgba(0,212,255,0.4); }

  .bottom-bar { position: fixed; bottom: 14px; left: 30px; right: 30px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; }
  .bottom-bar .chip { font-size: 9px; letter-spacing: 3px; color: rgba(0,212,255,0.35); }
  .bottom-bar .clock { font-size: 22px; font-weight: 500; color: rgba(105,241,241,0.7); text-shadow: 0 0 8px rgba(0,212,255,0.5); }
  .bottom-bar .power { font-size: 11px; color: rgba(0,212,255,0.5); }
  .bottom-bar .thermal { font-size: 9px; letter-spacing: 2px; color: rgba(0,212,255,0.35); }

  .central-stats { position: fixed; pointer-events: none; z-index: 10; text-align: center; transform: translate(-50%, -50%); }
  .central-stats .chip-name { font-size: 9px; letter-spacing: 4px; color: rgba(0,212,255,0.4); }
  .central-stats .watts { font-size: 48px; font-weight: bold; color: #69F1F1; text-shadow: 0 0 3px rgba(0,212,255,0.95), 0 0 12px rgba(0,212,255,0.5), 0 0 30px rgba(0,212,255,0.25), 0 0 60px rgba(0,212,255,0.1); }
  .central-stats .watts-label { font-size: 7px; letter-spacing: 5px; color: rgba(0,212,255,0.55); }
  .central-stats .divider { width: 80px; height: 0.5px; background: rgba(0,212,255,0.4); margin: 6px auto; box-shadow: 0 0 6px rgba(0,212,255,0.3); }
  .central-stats .thermal-state { font-size: 9px; letter-spacing: 3px; color: #00D4FF; text-shadow: 0 0 5px rgba(0,212,255,0.7); }

  .side-panel { position: fixed; pointer-events: none; z-index: 10; }
  .panel-box { background: rgba(0,0,0,0.55); border: 0.5px solid rgba(0,212,255,0.25); border-radius: 3px; padding: 8px 10px; margin-bottom: 12px; box-shadow: 0 0 8px rgba(0,212,255,0.1); position: relative; }
  .panel-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 0.5px; background: rgba(0,212,255,0.15); border-radius: 3px 3px 0 0; }
  .panel-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .panel-header .accent { width: 3px; height: 10px; border-radius: 1px; }
  .panel-header .name { font-size: 8px; letter-spacing: 3px; }
  .panel-value { font-size: 20px; font-weight: bold; margin: 2px 0; }
  .panel-sub { font-size: 6px; letter-spacing: 2px; opacity: 0.3; }
  .panel-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin: 3px 0; }
  .panel-row .label { font-size: 8px; letter-spacing: 2px; opacity: 0.45; }
  .panel-row .val { font-size: 16px; font-weight: bold; }

  /* Recording status */
  #recStatus { position: fixed; top: 5px; left: 50%; transform: translateX(-50%); color: #FF2633; font-size: 10px; z-index: 999; display: none; }
</style>
</head>
<body>

<canvas id="hud"></canvas>
<div id="recStatus">REC</div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="top-bar">
  <div class="top-left">
    <div class="label1">macOS SILICON</div>
    <div class="label2">JARVIS TELEMETRY v3.1</div>
  </div>
  <div class="top-center" id="topTime">14:32</div>
  <div class="top-right">
    <div class="day" id="topDay">09</div>
    <div class="month" id="topMonth">APRIL 2026</div>
  </div>
</div>

<div class="bottom-bar">
  <div class="chip">APPLE M4 MAX</div>
  <div class="clock" id="botClock">14:32</div>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="power" id="botPower">22W</div>
    <div class="thermal" id="thermalLabel">NOMINAL</div>
  </div>
</div>

<div class="central-stats" id="centralStats">
  <div class="chip-name">APPLE M4 MAX</div>
  <div class="watts" id="wattsVal">22</div>
  <div class="watts-label">WATTS</div>
  <div class="divider"></div>
  <div class="thermal-state" id="thermalState">NOMINAL</div>
</div>

<div class="side-panel" id="leftPanel">
  <div class="panel-box">
    <div class="panel-header"><div class="accent" style="background:rgba(255,200,0,0.5)"></div><div class="name" style="color:rgba(255,200,0,0.55)">DVHOP</div></div>
    <div class="panel-value" id="dvhopVal" style="color:#FFC800;text-shadow:0 0 3px rgba(255,200,0,0.9),0 0 10px rgba(255,200,0,0.4),0 0 25px rgba(255,200,0,0.15)">0.42%</div>
    <div class="panel-sub" style="color:#FFC800">Hypervisor CPU Tax</div>
  </div>
  <div class="panel-box">
    <div class="panel-header"><div class="accent" style="background:rgba(0,212,255,0.5)"></div><div class="name" style="color:rgba(0,212,255,0.55)">GUMER</div></div>
    <div class="panel-value" id="gumerVal" style="color:#00D4FF;text-shadow:0 0 3px rgba(0,212,255,0.9),0 0 10px rgba(0,212,255,0.4),0 0 25px rgba(0,212,255,0.15)">1.24 MB/s</div>
    <div class="panel-sub" style="color:#00D4FF">UMA Eviction Rate</div>
  </div>
  <div class="panel-box">
    <div class="panel-header"><div class="accent" style="background:rgba(255,38,51,0.5)"></div><div class="name" style="color:rgba(255,38,51,0.55)">CCTC</div></div>
    <div class="panel-value" id="cctcVal" style="color:#FF2633;text-shadow:0 0 3px rgba(255,38,51,0.9),0 0 10px rgba(255,38,51,0.4),0 0 25px rgba(255,38,51,0.15)">+2.1°C</div>
    <div class="panel-sub" style="color:#FF2633">Thermal Cost</div>
  </div>
</div>

<div class="side-panel" id="rightPanel">
  <div class="panel-box" style="text-align:right">
    <div class="panel-header" style="justify-content:flex-end"><div class="name" style="color:rgba(0,212,255,0.35)">THERMAL</div><div class="accent" style="background:rgba(0,212,255,0.25)"></div></div>
    <div class="panel-row"><div class="label" style="color:#FFC800">CPU</div><div class="val" id="cpuTempVal" style="color:#FFC800;text-shadow:0 0 3px rgba(255,200,0,0.7),0 0 10px rgba(255,200,0,0.3)">42.1°C</div></div>
    <div class="panel-row"><div class="label" style="color:#FFC800">GPU</div><div class="val" id="gpuTempVal" style="color:#FFC800;text-shadow:0 0 3px rgba(255,200,0,0.7),0 0 10px rgba(255,200,0,0.3)">38.5°C</div></div>
    <div class="panel-row"><div class="label" style="color:#00D4FF">ANE</div><div class="val" id="aneVal" style="color:#00D4FF;text-shadow:0 0 3px rgba(0,212,255,0.7),0 0 10px rgba(0,212,255,0.3)">0.12W</div></div>
    <div class="panel-row"><div class="label" style="color:#00D4FF">SWAP</div><div class="val" id="swapVal" style="color:#00D4FF;text-shadow:0 0 3px rgba(0,212,255,0.7),0 0 10px rgba(0,212,255,0.3)">12%</div></div>
  </div>
  <div class="panel-box" style="text-align:right">
    <div class="panel-header" style="justify-content:flex-end"><div class="name" style="color:rgba(0,212,255,0.35)">DRAM BW</div><div class="accent" style="background:rgba(0,212,255,0.25)"></div></div>
    <div class="panel-value" id="dramVal" style="color:#00D4FF;text-shadow:0 0 3px rgba(0,212,255,0.8),0 0 12px rgba(0,212,255,0.3)">24.8</div>
    <div class="panel-sub" style="color:#00D4FF">GB/s READ</div>
  </div>
</div>

<script>
const canvas = document.getElementById('hud');
const ctx = canvas.getContext('2d');
let W = 1280, H = 720, cx, cy, R;
let phase = 0;

const CYAN = [0,212,255], CYAN_B = [105,241,241], CYAN_D = [0,140,179];
const AMBER = [255,200,0], CRIMSON = [255,38,51], STEEL = [102,132,148], GRID_BLUE = [0,51,77];

function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

const SIM = {
  eCores: [0.35,0.62,0.18,0.44,0.71,0.28,0.55,0.39,0.82,0.15],
  pCores: [0.45,0.78,0.32,0.56,0.68,0.41,0.73,0.29,0.60,0.85,0.22,0.50],
  sCores: [0.22,0.45,0.67], gpu: 0.42
};

// Dynamic telemetry simulation — smoothly varying values like real macOS sensors
function updateSIM(t) {
  for (let i = 0; i < SIM.eCores.length; i++)
    SIM.eCores[i] = 0.15 + 0.55 * (0.5 + 0.5 * Math.sin(t * 0.8 + i * 1.3));
  for (let i = 0; i < SIM.pCores.length; i++)
    SIM.pCores[i] = 0.20 + 0.60 * (0.5 + 0.5 * Math.sin(t * 0.6 + i * 0.9 + 2.1));
  for (let i = 0; i < SIM.sCores.length; i++)
    SIM.sCores[i] = 0.10 + 0.50 * (0.5 + 0.5 * Math.sin(t * 0.5 + i * 1.8 + 4.0));
  SIM.gpu = 0.25 + 0.45 * (0.5 + 0.5 * Math.sin(t * 0.4 + 1.5));

  const watts = (14 + 18 * (0.5 + 0.5 * Math.sin(t * 0.35))).toFixed(0);
  const cpuTemp = (38 + 12 * (0.5 + 0.5 * Math.sin(t * 0.25))).toFixed(1);
  const gpuTemp = (34 + 10 * (0.5 + 0.5 * Math.sin(t * 0.3 + 1.0))).toFixed(1);
  const aneW = (0.05 + 0.20 * (0.5 + 0.5 * Math.sin(t * 0.4 + 2.0))).toFixed(2);
  const swapPct = Math.round(5 + 15 * (0.5 + 0.5 * Math.sin(t * 0.15 + 3.0)));
  const dramBW = (18 + 14 * (0.5 + 0.5 * Math.sin(t * 0.5 + 0.8))).toFixed(1);
  const dvhop = (0.20 + 0.40 * (0.5 + 0.5 * Math.sin(t * 0.6 + 1.2))).toFixed(2);
  const gumer = (0.80 + 1.00 * (0.5 + 0.5 * Math.sin(t * 0.45 + 2.5))).toFixed(2);
  const cctc = (1.0 + 3.0 * (0.5 + 0.5 * Math.sin(t * 0.3 + 3.5))).toFixed(1);

  const el = (id) => document.getElementById(id);
  if (el('wattsVal')) el('wattsVal').textContent = watts;
  if (el('botPower')) el('botPower').textContent = watts + 'W';
  if (el('dvhopVal')) el('dvhopVal').textContent = dvhop + '%';
  if (el('gumerVal')) el('gumerVal').textContent = gumer + ' MB/s';
  if (el('cctcVal')) el('cctcVal').textContent = '+' + cctc + '°C';
  if (el('cpuTempVal')) el('cpuTempVal').textContent = cpuTemp + '°C';
  if (el('gpuTempVal')) el('gpuTempVal').textContent = gpuTemp + '°C';
  if (el('aneVal')) el('aneVal').textContent = aneW + 'W';
  if (el('swapVal')) el('swapVal').textContent = swapPct + '%';
  if (el('dramVal')) el('dramVal').textContent = dramBW;

  // Thermal state changes based on CPU temp
  const cpuT = parseFloat(cpuTemp);
  if (el('thermalState')) {
    if (cpuT > 48) { el('thermalState').textContent = 'ELEVATED'; el('thermalState').style.color = '#FFC800'; }
    else if (cpuT > 45) { el('thermalState').textContent = 'ACTIVE'; el('thermalState').style.color = '#00D4FF'; }
    else { el('thermalState').textContent = 'NOMINAL'; el('thermalState').style.color = '#00D4FF'; }
  }
  if (el('thermalLabel')) {
    if (cpuT > 48) { el('thermalLabel').textContent = 'ELEVATED'; el('thermalLabel').style.color = 'rgba(255,200,0,0.5)'; }
    else { el('thermalLabel').textContent = 'NOMINAL'; }
  }
}

function resize() {
  W = 1280; H = 720;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  cx = W / 2; cy = H / 2; R = Math.min(W, H) * 0.42;
  const cs = document.getElementById('centralStats');
  cs.style.left = cx + 'px'; cs.style.top = cy + 'px';
  const lp = document.getElementById('leftPanel');
  lp.style.left = (W * 0.015) + 'px'; lp.style.top = (H * 0.28) + 'px'; lp.style.width = (W * 0.14) + 'px';
  const rp = document.getElementById('rightPanel');
  rp.style.right = (W * 0.015) + 'px'; rp.style.top = (H * 0.28) + 'px'; rp.style.width = (W * 0.16) + 'px';
}

// ── Drawing Helpers ─────────────────────────────────────────

function ring(r, col, w, dash) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = col; ctx.lineWidth = w; ctx.lineCap = 'butt';
  if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
  ctx.stroke(); ctx.setLineDash([]);
}

function glowRing(r, col, w, bloom) {
  bloom = bloom || 6;
  ring(r, rgba(col, 0.03), w + bloom);
  ring(r, rgba(col, 0.12), w + bloom * 0.3);
  ring(r, rgba(col, 1.0), w);
  ring(r, 'rgba(255,255,255,0.12)', w * 0.3);
}

function ticks(r, n, len, col, w, rot, majorEvery) {
  rot = rot || 0; majorEvery = majorEvery || 5;
  const rotOff = rot * phase;
  for (let i = 0; i < n; i++) {
    const isMajor = (i % majorEvery === 0);
    const tLen = isMajor ? len * 1.8 : len;
    const tW = isMajor ? w * 2.0 : w;
    const a = (i / n) * Math.PI * 2 + rotOff;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (r - tLen/2), cy + Math.sin(a) * (r - tLen/2));
    ctx.lineTo(cx + Math.cos(a) * (r + tLen/2), cy + Math.sin(a) * (r + tLen/2));
    ctx.strokeStyle = isMajor ? col : col.replace(/,([^,]+)\)$/, (_, v) => ',' + (parseFloat(v) * 0.5) + ')');
    ctx.lineWidth = tW; ctx.lineCap = 'butt'; ctx.stroke();
  }
}

function notch(r, n, frac, col, w, rot) {
  rot = rot || 0;
  const seg = Math.PI * 2 / n, rotOff = rot * phase, top = -Math.PI / 2;
  for (let i = 0; i < n; i++) {
    const s = (i / n) * Math.PI * 2 + top + rotOff;
    ctx.beginPath(); ctx.arc(cx, cy, r, s, s + seg * frac);
    ctx.strokeStyle = col; ctx.lineWidth = w; ctx.lineCap = 'butt'; ctx.stroke();
  }
}

function glowArcs(r, segments, col, w, rot, bloom) {
  rot = rot || 0; bloom = bloom || 4;
  const rotOff = rot * phase;
  for (const seg of segments) {
    const s = seg[0] + rotOff, e = s + seg[1];
    ctx.beginPath(); ctx.arc(cx, cy, r, s, e);
    ctx.strokeStyle = rgba(col, 0.05); ctx.lineWidth = w + bloom; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r, s, e);
    ctx.strokeStyle = rgba(col, 0.20); ctx.lineWidth = w + 1; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r, s, e);
    ctx.strokeStyle = rgba(col, 1.0); ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
  }
}

function arcs(r, segments, col, w, rot) {
  rot = rot || 0;
  const rotOff = rot * phase;
  for (const seg of segments) {
    const s = seg[0] + rotOff;
    ctx.beginPath(); ctx.arc(cx, cy, r, s, s + seg[1]);
    ctx.strokeStyle = col; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
  }
}

function chevrons(r, col, sz, count, rot) {
  count = count || 4; rot = rot || 0;
  const rotOff = rot * phase, top = -Math.PI / 2;
  for (let i = 0; i < count; i++) {
    const a = (i * Math.PI * 2 / count) + top + rotOff;
    const tip = { x: cx + Math.cos(a) * (r + sz), y: cy + Math.sin(a) * (r + sz) };
    const l = { x: cx + Math.cos(a - 0.08) * (r - sz * 0.2), y: cy + Math.sin(a - 0.08) * (r - sz * 0.2) };
    const rr = { x: cx + Math.cos(a + 0.08) * (r - sz * 0.2), y: cy + Math.sin(a + 0.08) * (r - sz * 0.2) };
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(tip.x, tip.y); ctx.lineTo(rr.x, rr.y);
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  }
}

function dots(r, n, col, sz, rot) {
  rot = rot || 0;
  const rotOff = rot * phase;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + rotOff;
    ctx.beginPath(); ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, sz / 2, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.fill();
  }
}

function coreArcs(usages, r, w, col) {
  if (!usages.length) return;
  const n = usages.length, sw = Math.PI * 2 / n, gap = sw * 0.06, top = -Math.PI / 2;
  for (let i = 0; i < n; i++) {
    const s0 = top + sw * i + gap / 2, s1 = s0 + sw - gap;
    ctx.beginPath(); ctx.arc(cx, cy, r, s0, s1);
    ctx.strokeStyle = rgba(col, 0.05); ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
    const u = usages[i]; if (u <= 0) continue;
    const fe = s0 + (s1 - s0) * u;
    ctx.beginPath(); ctx.arc(cx, cy, r, s0, fe);
    ctx.strokeStyle = rgba(col, 0.03); ctx.lineWidth = w + 3; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r, s0, fe);
    ctx.strokeStyle = rgba(col, 0.18); ctx.lineWidth = w + 0.5; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r, s0, fe);
    ctx.strokeStyle = rgba(col, 0.65); ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r, s0, fe);
    ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = w * 0.25; ctx.lineCap = 'round'; ctx.stroke();
  }
}

function spokes(rInner, rOuter, n, col, w, rot) {
  rot = rot || 0;
  const rotOff = rot * phase;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + rotOff;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * rInner, cy + Math.sin(a) * rInner);
    ctx.lineTo(cx + Math.cos(a) * rOuter, cy + Math.sin(a) * rOuter);
    ctx.strokeStyle = col; ctx.lineWidth = w; ctx.lineCap = 'butt'; ctx.stroke();
  }
}

function drawBezelPanels(panelInner, panelOuter, panelCount, panelArcFrac) {
  const panelW = panelOuter - panelInner, midR = (panelInner + panelOuter) / 2;
  for (let i = 0; i < panelCount; i++) {
    const segAngle = Math.PI * 2 / panelCount;
    const startA = i * segAngle + segAngle * (1.0 - panelArcFrac) / 2;
    const endA = startA + segAngle * panelArcFrac;
    ctx.beginPath(); ctx.arc(cx, cy, midR, startA, endA);
    ctx.strokeStyle = rgba(STEEL, 0.06); ctx.lineWidth = panelW; ctx.lineCap = 'butt'; ctx.stroke();
    const borderOp = 0.18 + Math.sin(phase * 0.5 + i * 0.5) * 0.04;
    ctx.beginPath(); ctx.arc(cx, cy, midR, startA, endA);
    ctx.strokeStyle = rgba(STEEL, borderOp); ctx.lineWidth = panelW; ctx.lineCap = 'butt'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, panelInner, startA, endA);
    ctx.strokeStyle = rgba(STEEL, 0.25); ctx.lineWidth = 0.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, panelOuter, startA, endA);
    ctx.strokeStyle = rgba(STEEL, 0.25); ctx.lineWidth = 0.5; ctx.stroke();
    for (const angle of [startA, endA]) {
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * panelInner, cy + Math.sin(angle) * panelInner);
      ctx.lineTo(cx + Math.cos(angle) * panelOuter, cy + Math.sin(angle) * panelOuter);
      ctx.strokeStyle = rgba(STEEL, 0.20); ctx.lineWidth = 0.5; ctx.stroke();
    }
  }
}

// ── Hex Grid ────────────────────────────────────────────────

function drawHexGrid() {
  const spacing = 48, hexR = 24;
  const cols = Math.ceil(W / (spacing * 0.866)) + 2, rows = Math.ceil(H / spacing) + 2;
  const pulse = Math.sin(phase * 0.3) * 0.3 + 0.7;
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const offX = (row % 2 === 0) ? 0 : spacing * 0.433;
      const hx = col * spacing * 0.866 + offX, hy = row * spacing * 0.75;
      const dx = hx - W / 2, dy = hy - H / 2;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = Math.sqrt(W * W + H * H) / 2;
      const falloff = Math.max(0, 1.0 - dist / (maxDist * 0.8));
      const op = 0.04 * falloff * pulse;
      if (op < 0.005) continue;
      ctx.beginPath();
      for (let j = 0; j < 6; j++) {
        const a = Math.PI / 3 * j - Math.PI / 6;
        const px = hx + hexR * Math.cos(a), py = hy + hexR * Math.sin(a);
        j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.strokeStyle = rgba(GRID_BLUE, op); ctx.lineWidth = 0.5; ctx.stroke();
    }
  }
}

function drawScanLines() {
  const lineSpacing = 3, count = Math.floor(H / lineSpacing);
  for (let i = 0; i < count; i++) {
    const y = i * lineSpacing;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y);
    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1; ctx.stroke();
  }
  const scanY = ((phase % 8) / 8) * H, beamH = 60;
  for (let i = 0; i < beamH; i++) {
    const y = scanY + i - beamH / 2;
    if (y < 0 || y >= H) continue;
    const intensity = 1.0 - Math.abs(i - beamH / 2) / (beamH / 2);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y);
    ctx.strokeStyle = rgba(CYAN, intensity * 0.06); ctx.lineWidth = 1; ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════════
// MAIN RENDER — deterministic, called with explicit phase value
// ═══════════════════════════════════════════════════════════════

function drawFrame(framePhase) {
  phase = framePhase;
  updateSIM(phase);

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#050A14'; ctx.fillRect(0, 0, W, H);

  const grad = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, Math.max(W, H) * 0.7);
  grad.addColorStop(0, rgba(CYAN, 0.03)); grad.addColorStop(0.3, rgba(CYAN, 0.015));
  grad.addColorStop(0.6, 'rgba(0,0,0,0)'); grad.addColorStop(1, rgba([5,10,20], 0.6));
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  drawHexGrid();
  drawScanLines();

  // ── 0. ULTRA-DENSE BASE RING FILL (220 rings) ────────────
  for (let i = 0; i < 220; i++) {
    const frac = i / 220, r = R * (0.06 + frac * 0.91);
    const distFromCenter = 1.0 - frac, baseOp = 0.06 + distFromCenter * 0.14, m = i % 18;
    if (m === 0) { ring(r, rgba(STEEL, Math.min(baseOp + 0.12, 0.30)), 1.8); ring(r, rgba(CYAN_D, Math.min(baseOp + 0.03, 0.08)), 4); }
    else if (m === 9) ring(r, rgba(CYAN_D, Math.min(baseOp + 0.05, 0.20)), 1.0);
    else if (m === 3 || m === 12) ring(r, rgba(STEEL, baseOp * 0.7), 2.0);
    else if (m === 6 || m === 15) ring(r, rgba(STEEL, baseOp * 0.4), 0.4, [2, 5]);
    else if (m === 4 || m === 13) notch(r, 6 + (i % 7) * 2, 0.6, rgba(STEEL, baseOp * 0.55), 0.7);
    else if (m === 7 || m === 16) ring(r, rgba(STEEL, baseOp * 0.3), 0.3, [1, 3]);
    else ring(r, rgba(STEEL, baseOp * 0.35), 0.3);
  }

  // ── 0b. ACCENT GLOW RINGS ─────────────────────────────────
  glowRing(R * 0.94, CYAN_D, 0.6, 3);
  glowRing(R * 0.82, CYAN_D, 0.5, 3);
  glowRing(R * 0.72, CYAN_D, 0.5, 3);
  glowRing(R * 0.62, CYAN_D, 0.5, 3);
  glowRing(R * 0.50, CYAN_D, 0.5, 2);
  glowRing(R * 0.38, CYAN_D, 0.4, 2);
  glowRing(R * 0.25, CYAN_D, 0.4, 2);

  // ── MASSIVE OUTER BEZEL ───────────────────────────────────
  ring(R * 1.01, rgba(STEEL, 0.16), R * 0.14);
  ring(R * 1.01, rgba(STEEL, 0.08), R * 0.18);
  ring(R * 1.01, rgba(STEEL, 0.04), R * 0.22);
  ring(R * 0.97, rgba(STEEL, 0.12), 0.8);
  ring(R * 0.99, rgba(STEEL, 0.10), 0.8);
  ring(R * 1.01, rgba(STEEL, 0.18), 1.5);
  ring(R * 1.03, rgba(STEEL, 0.10), 0.8);
  ring(R * 1.05, rgba(STEEL, 0.12), 0.8);
  ring(R * 1.08, rgba(STEEL, 0.38), 1.5);
  ring(R * 1.08, rgba(CYAN, 0.04), 2);
  ring(R * 0.94, rgba(STEEL, 0.42), 2.0);
  ring(R * 0.94, rgba(CYAN, 0.06), 3);
  drawBezelPanels(R * 0.95, R * 1.07, 12, 0.62);
  spokes(R * 0.94, R * 1.08, 36, rgba(STEEL, 0.12), 0.3);
  spokes(R * 0.94, R * 1.08, 12, rgba(STEEL, 0.22), 0.6);
  chevrons(R * 1.03, rgba(CYAN, 0.30), 10, 4);
  ring(R * 0.965, rgba(CYAN, 0.20), 0.8);
  ring(R * 1.005, rgba(CYAN, 0.03), 5);

  // ── AMBER ACCENT RING ─────────────────────────────────────
  glowRing(R * 0.955, AMBER, 1.2, 5);
  ring(R * 0.955, rgba(AMBER, 0.10), 3);

  // ── OUTER TICK RING ───────────────────────────────────────
  ticks(R * 0.96, 150, 8, rgba(STEEL, 0.50), 0.5, 0.06, 5);
  ring(R * 0.95, rgba(CYAN, 0.35), 0.8);

  // ── ROTATING GLOW ARCS (outer) ────────────────────────────
  glowArcs(R * 0.935, [[0.2,0.9],[1.6,1.2],[3.2,0.7],[4.8,1.0],[5.8,0.5]], CYAN_D, 2.5, -0.04, 4);
  ring(R * 0.925, rgba(STEEL, 0.18), 0.5, [2, 5]);

  // ── GPU ARC ───────────────────────────────────────────────
  ring(R * 0.915, rgba(STEEL, 0.08), 3);
  if (SIM.gpu > 0) {
    const gS = -Math.PI * 0.75, gE = gS + Math.PI * 1.5 * SIM.gpu;
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.915, gS, gE); ctx.strokeStyle = rgba(CYAN, 0.04); ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.915, gS, gE); ctx.strokeStyle = rgba(CYAN, 0.20); ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.915, gS, gE); ctx.strokeStyle = rgba(CYAN, 0.65); ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.915, gS, gE); ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 0.5; ctx.lineCap = 'round'; ctx.stroke();
  }
  ring(R * 0.905, rgba(CYAN, 0.18), 0.5);

  // ── TICK RING 2 ───────────────────────────────────────────
  ticks(R * 0.895, 100, 6, rgba(STEEL, 0.45), 0.5, -0.10, 5);
  notch(R * 0.88, 40, 0.50, rgba(STEEL, 0.28), 3, 0.02);
  ring(R * 0.87, rgba(STEEL, 0.30), 0.8);

  // ── INTERMEDIATE BEZEL 1 (E-core boundary) ────────────────
  ring(R * 0.875, rgba(STEEL, 0.14), R * 0.04);
  ring(R * 0.875, rgba(STEEL, 0.06), R * 0.05);
  ring(R * 0.895, rgba(STEEL, 0.32), 1.2);
  ring(R * 0.855, rgba(STEEL, 0.35), 1.2);
  ring(R * 0.875, rgba(STEEL, 0.18), 1.0);
  drawBezelPanels(R * 0.858, R * 0.892, 16, 0.55);
  spokes(R * 0.855, R * 0.895, 24, rgba(STEEL, 0.15), 0.3, 0.01);

  // ── E-CORES ───────────────────────────────────────────────
  coreArcs(SIM.eCores, R * 0.845, 3, CYAN);
  ring(R * 0.83, rgba(CYAN, 0.30), 0.6);
  dots(R * 0.815, 16, rgba(CYAN, 0.40), 3, 0.12);
  ticks(R * 0.80, 80, 5, rgba(STEEL, 0.40), 0.5, 0.14, 8);
  ring(R * 0.79, rgba(STEEL, 0.22), 0.5, [1, 3]);
  glowArcs(R * 0.78, [[0.5,1.4],[2.3,0.8],[4.0,1.6],[5.8,0.5]], CYAN_D, 2, -0.08, 3);
  notch(R * 0.77, 20, 0.55, rgba(STEEL, 0.22), 3, 0.03);
  ring(R * 0.76, rgba(CYAN, 0.22), 0.8);

  // ── INTERMEDIATE BEZEL 2 (P-core boundary) ────────────────
  ring(R * 0.765, rgba(STEEL, 0.12), R * 0.03);
  ring(R * 0.765, rgba(STEEL, 0.05), R * 0.04);
  ring(R * 0.78, rgba(STEEL, 0.28), 1.0);
  ring(R * 0.75, rgba(STEEL, 0.30), 1.0);
  ring(R * 0.765, rgba(STEEL, 0.15), 0.8);
  drawBezelPanels(R * 0.752, R * 0.778, 20, 0.50);
  spokes(R * 0.75, R * 0.78, 30, rgba(STEEL, 0.12), 0.3, -0.01);

  // ── P-CORES ───────────────────────────────────────────────
  coreArcs(SIM.pCores, R * 0.745, 3, AMBER);
  ring(R * 0.73, rgba(STEEL, 0.28), 0.5);
  ticks(R * 0.715, 60, 5, rgba(STEEL, 0.38), 0.5, -0.18, 5);
  chevrons(R * 0.70, rgba(CYAN, 0.35), 7, 4, 0.05);
  ring(R * 0.695, rgba(STEEL, 0.22), 0.5);
  glowArcs(R * 0.685, [[0.8,0.6],[1.8,1.1],[3.5,0.9],[5.0,0.5],[5.7,0.4]], CYAN_D, 2, 0.06, 3);
  notch(R * 0.675, 14, 0.65, rgba(STEEL, 0.25), 3.5, -0.04);
  ring(R * 0.665, rgba(CYAN, 0.20), 0.8);

  // ── S-CORES ───────────────────────────────────────────────
  coreArcs(SIM.sCores, R * 0.645, 2.5, CRIMSON);
  ring(R * 0.63, rgba(STEEL, 0.28), 0.5);
  ticks(R * 0.615, 48, 5, rgba(STEEL, 0.35), 0.5, 0.25, 4);
  ring(R * 0.605, rgba(STEEL, 0.18), 0.5, [1, 3]);
  ring(R * 0.60, rgba(STEEL, 0.15), 0.4);
  ticks(R * 0.595, 40, 3, rgba(STEEL, 0.22), 0.3, -0.08);
  ring(R * 0.59, rgba(CYAN, 0.08), 0.4, [1, 3]);
  dots(R * 0.585, 10, rgba(CYAN, 0.30), 2.5, -0.20);

  // ── INNER DETAIL ZONE ─────────────────────────────────────
  glowArcs(R * 0.58, [[0.3,1.6],[2.5,1.0],[4.2,1.3],[5.9,0.3]], CYAN_D, 2, -0.12, 3);
  ring(R * 0.57, rgba(CYAN, 0.18), 0.6);
  ticks(R * 0.555, 36, 6, rgba(STEEL, 0.35), 0.6, -0.35, 3);
  notch(R * 0.54, 9, 0.72, rgba(STEEL, 0.25), 3.5, 0.08);
  ring(R * 0.53, rgba(STEEL, 0.20), 0.5, [2, 4]);
  ticks(R * 0.525, 120, 3.5, rgba(STEEL, 0.28), 0.3, 0.18);
  ring(R * 0.52, rgba(STEEL, 0.16), 0.4);
  ring(R * 0.515, rgba(CYAN, 0.12), 0.4);
  ticks(R * 0.51, 60, 2.5, rgba(STEEL, 0.20), 0.3, -0.12);
  ring(R * 0.505, rgba(STEEL, 0.14), 0.4, [1, 2]);
  notch(R * 0.50, 24, 0.50, rgba(STEEL, 0.18), 2.0, -0.06);
  ring(R * 0.495, rgba(CYAN, 0.10), 0.4);
  ring(R * 0.49, rgba(STEEL, 0.12), 0.3);
  ticks(R * 0.485, 80, 2.5, rgba(STEEL, 0.18), 0.3, 0.22);
  ring(R * 0.48, rgba(STEEL, 0.14), 0.4);
  arcs(R * 0.475, [[0.0,0.9],[1.4,0.7],[2.8,1.1],[4.5,0.6],[5.5,0.5]], rgba(CYAN_D, 0.08), 1.5, 0.10);
  ring(R * 0.47, rgba(CYAN, 0.10), 0.4);
  ticks(R * 0.465, 48, 3, rgba(STEEL, 0.16), 0.3, -0.15);
  ring(R * 0.46, rgba(STEEL, 0.12), 0.3, [1, 2]);
  notch(R * 0.455, 12, 0.60, rgba(STEEL, 0.15), 2.0, 0.04);

  // ── INNER REACTOR CORE ────────────────────────────────────
  ticks(R * 0.45, 24, 7, rgba(STEEL, 0.38), 0.7, -0.15);
  glowRing(R * 0.44, CYAN, 1.5, 10);
  chevrons(R * 0.43, rgba(CYAN, 0.30), 6, 4, 0.08);
  ticks(R * 0.41, 24, 5, rgba(STEEL, 0.32), 0.5, 0.45);
  ring(R * 0.40, rgba(STEEL, 0.18), 0.5);
  notch(R * 0.39, 6, 0.78, rgba(STEEL, 0.20), 2.5, -0.10);
  ring(R * 0.385, rgba(CYAN, 0.15), 0.5, [2, 3]);
  ring(R * 0.37, rgba(STEEL, 0.18), 0.5);
  ticks(R * 0.35, 12, 8, rgba(CYAN, 0.28), 0.8, -0.25);
  glowRing(R * 0.34, CYAN_D, 0.8, 4);
  ring(R * 0.32, rgba(STEEL, 0.14), 0.5, [1, 2]);
  dots(R * 0.30, 8, rgba(CYAN, 0.25), 2.5, 0.30);
  ring(R * 0.28, rgba(CYAN, 0.12), 0.5);
  ring(R * 0.25, rgba(STEEL, 0.10), 0.5);
  ring(R * 0.22, rgba(CYAN, 0.08), 0.5, [1, 2]);
  ticks(R * 0.20, 8, 5, rgba(CYAN, 0.15), 0.5, -0.40);
  ring(R * 0.18, rgba(CYAN, 0.06), 0.4);

  // ── LONG STRUCTURAL SPOKES ────────────────────────────────
  spokes(R * 0.18, R * 0.44, 12, rgba(STEEL, 0.06), 0.3, -0.02);
  spokes(R * 0.45, R * 0.60, 18, rgba(STEEL, 0.05), 0.3, 0.03);
  spokes(R * 0.60, R * 0.75, 24, rgba(STEEL, 0.05), 0.3, -0.01);
  spokes(R * 0.80, R * 0.96, 36, rgba(STEEL, 0.04), 0.3, 0.02);

  // ── CORE GLOW ─────────────────────────────────────────────
  const corePulse = 0.85 + Math.sin(phase * 2.5) * 0.15;
  for (let layer = 0; layer < 5; layer++) {
    const lr = R * 0.02 + layer * 3, lo = 0.06 * corePulse * (1.0 - layer / 5);
    ctx.beginPath(); ctx.arc(cx, cy, lr, 0, Math.PI * 2);
    ctx.fillStyle = rgba(CYAN, lo); ctx.fill();
  }
  const hotR = R * 0.015 * corePulse;
  ctx.beginPath(); ctx.arc(cx, cy, hotR, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${0.15 * corePulse})`; ctx.fill();

  // ── SWEEP LINE ────────────────────────────────────────────
  const sA = (phase % 10) / 10 * Math.PI * 2;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(sA) * R * 0.15, cy + Math.sin(sA) * R * 0.15);
  ctx.lineTo(cx + Math.cos(sA) * R, cy + Math.sin(sA) * R);
  ctx.strokeStyle = rgba(CYAN, 0.14); ctx.lineWidth = 1.2; ctx.stroke();
  for (let t = 1; t <= 8; t++) {
    const tA = sA - t * 0.015;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(tA) * R * 0.15, cy + Math.sin(tA) * R * 0.15);
    ctx.lineTo(cx + Math.cos(tA) * R, cy + Math.sin(tA) * R);
    ctx.strokeStyle = rgba(CYAN, 0.06 / t); ctx.lineWidth = 1.0; ctx.stroke();
  }
  const sA2 = (phase % 16) / 16 * Math.PI * 2;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(-sA2) * R * 0.30, cy + Math.sin(-sA2) * R * 0.30);
  ctx.lineTo(cx + Math.cos(-sA2) * R * 0.80, cy + Math.sin(-sA2) * R * 0.80);
  ctx.strokeStyle = rgba(CYAN_D, 0.08); ctx.lineWidth = 0.8; ctx.stroke();

  // Sweep wedge
  for (let s = 0; s < 20; s++) {
    const frac = s / 20, aStart = sA - 0.35 * frac, aEnd = sA - 0.35 * (frac + 0.05);
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R * 0.98, aStart, aEnd, true); ctx.closePath();
    ctx.fillStyle = rgba(CYAN, 0.05 * (1.0 - frac)); ctx.fill();
  }

  // ── TARGETING RETICLE ─────────────────────────────────────
  const rP = 0.85 + Math.sin(phase * 1.5) * 0.15;
  for (const [rr, op] of [[R*0.12, 0.12], [R*0.08, 0.18], [R*0.05, 0.08]]) {
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(CYAN, op * rP); ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
  }
  for (const angle of [0, Math.PI / 2]) {
    const dx = Math.cos(angle), dy = Math.sin(angle);
    ctx.beginPath();
    ctx.moveTo(cx + dx * R * 0.03, cy + dy * R * 0.03);
    ctx.lineTo(cx + dx * R * 0.10, cy + dy * R * 0.10);
    ctx.moveTo(cx - dx * R * 0.03, cy - dy * R * 0.03);
    ctx.lineTo(cx - dx * R * 0.10, cy - dy * R * 0.10);
    ctx.strokeStyle = rgba(CYAN, 0.15 * rP); ctx.lineWidth = 0.5; ctx.stroke();
  }

  // ── DEGREE MARKERS ────────────────────────────────────────
  ctx.font = '7px Menlo, monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const [angle, label] of [[0,'000'],[Math.PI/4,'045'],[Math.PI/2,'090'],[Math.PI*3/4,'135'],[Math.PI,'180'],[Math.PI*5/4,'225'],[Math.PI*3/2,'270'],[Math.PI*7/4,'315']]) {
    const tx = cx + Math.cos(angle - Math.PI/2) * R * 1.10;
    const ty = cy + Math.sin(angle - Math.PI/2) * R * 1.10;
    ctx.fillStyle = rgba(STEEL, 0.35); ctx.fillText(label, tx, ty);
  }

  // ── RING LABELS ───────────────────────────────────────────
  ctx.textAlign = 'center';
  ctx.font = '9px Menlo, monospace'; ctx.fillStyle = rgba(CYAN, 0.55);
  ctx.fillText('E-CORES', cx, cy - R * 0.845 - 18);
  ctx.font = '8px Menlo, monospace'; ctx.fillStyle = rgba(AMBER, 0.45);
  ctx.fillText('P-CORES', cx, cy - R * 0.745 - 15);
  ctx.fillStyle = rgba(CRIMSON, 0.45);
  ctx.fillText('S-CORES', cx, cy - R * 0.645 - 15);
  ctx.fillStyle = rgba(CYAN, 0.40);
  ctx.fillText('GPU', cx, cy - R * 0.915 - 14);
}

// ═══════════════════════════════════════════════════════════════
// RECORDING MODE — driven by URL parameter ?record=1
// Uses MediaRecorder + captureStream for WebM output
// ═══════════════════════════════════════════════════════════════

const FPS = 24;
const DURATION = 8; // seconds
const TOTAL_FRAMES = FPS * DURATION;

function startRecording() {
  document.getElementById('recStatus').style.display = 'block';

  // We need to composite the full page (canvas + DOM overlays) into a single stream.
  // Strategy: use a second offscreen canvas that captures the full viewport via
  // drawImage from the main canvas, then overlay DOM text via manual rendering.
  // BUT — since we're running in Chrome, the simplest approach is to just use
  // the animation loop and let the CDP screenshot capture the composited page.

  // For self-contained WebM recording: render canvas frames and record
  const stream = canvas.captureStream(0); // 0 = manual frame capture
  const recorder = new MediaRecorder(stream, {
    mimeType: 'video/webm;codecs=vp9',
    videoBitsPerSecond: 5000000
  });

  const chunks = [];
  recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'jarvis_animation.webm';
    a.click();
    document.getElementById('recStatus').textContent = 'DONE';
    console.log('RECORDING_COMPLETE');
  };

  recorder.start();
  let frame = 0;

  function captureFrame() {
    if (frame >= TOTAL_FRAMES) {
      recorder.stop();
      return;
    }
    const t = frame / FPS; // time in seconds
    drawFrame(t);

    // Request the stream to capture this frame
    stream.getVideoTracks()[0].requestFrame();
    frame++;

    // Use setTimeout to give the recorder time to process each frame
    setTimeout(captureFrame, 1000 / FPS);
  }

  captureFrame();
}

// ═══════════════════════════════════════════════════════════════
// NORMAL PREVIEW MODE — realtime animation loop
// ═══════════════════════════════════════════════════════════════

let animPhase = 0;
function animLoop() {
  drawFrame(animPhase);
  animPhase += 1/60;
  requestAnimationFrame(animLoop);
}

// ── INIT ────────────────────────────────────────────────────
resize();

// Check if we're in recording mode (CDP will set window.__RECORD = true)
if (location.search.includes('record=1') || window.__RECORD) {
  // Small delay to let fonts/layout settle
  setTimeout(startRecording, 500);
} else {
  // Normal preview mode
  animLoop();
}

// Expose drawFrame globally for CDP-based frame capture
window.drawFrame = drawFrame;
window.TOTAL_FRAMES = TOTAL_FRAMES;
window.FPS = FPS;
</script>
</body>
